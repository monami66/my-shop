<!DOCTYPE html>
<html>

<head>
  <title>Избранное</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial;
      background: #020808;
      color: white;
    }

    .navbar {
      height: 75px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 55px;
      background: rgba(0,0,0,0.9);
      border-bottom: 1px solid rgba(0,255,204,0.15);
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    .logo {
      font-size: 30px;
      font-weight: bold;
      color: white;
    }

    .logo span {
      color: #00ffcc;
    }

    .nav-links {
      display: flex;
      gap: 35px;
      align-items: center;
      flex-wrap: wrap;
    }

    .nav-links a {
      color: white;
      text-decoration: none;
      font-size: 17px;
      padding-bottom: 8px;
    }

    .nav-links a:hover {
      color: #00ffcc;
      border-bottom: 2px solid #00ffcc;
    }

    .btn,
    .user-btn {
      background: #00ffcc;
      color: black;
      border: none;
      padding: 12px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }

    .user-menu {
      position: relative;
    }

    .dropdown {
      display: none;
      position: absolute;
      right: 0;
      top: 50px;
      background: #081212;
      min-width: 240px;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 0 25px rgba(0,255,204,0.25);
      border: 1px solid rgba(0,255,204,0.25);
      z-index: 1000;
    }

    .dropdown.show {
      display: block;
    }

    .dropdown a,
    .dropdown button {
      display: block;
      width: 100%;
      padding: 13px;
      border: none;
      background: #081212;
      text-align: left;
      cursor: pointer;
      text-decoration: none;
      color: white;
      font-size: 15px;
    }

    .dropdown a:hover,
    .dropdown button:hover {
      background: #102020;
      color: #00ffcc;
    }

    .badge {
      background: crimson;
      color: white;
      padding: 4px 9px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: bold;
      margin-left: 5px;
    }

    .page-header {
      max-width: 1450px;
      margin: 25px auto;
      padding: 35px 40px;
      border-radius: 22px;
      border: 1px solid rgba(0,255,204,0.22);
      background:
        radial-gradient(circle at 80% 50%, rgba(0,255,204,0.18), transparent 35%),
        linear-gradient(90deg, #020808 0%, #061414 60%, #031010 100%);
      box-shadow: 0 0 35px rgba(0,255,204,0.08);
    }

    .page-header h1 {
      margin: 0;
      font-size: 44px;
    }

    .page-header h1 span {
      color: #00ffcc;
    }

    .page-header p {
      color: #bcbcbc;
      font-size: 18px;
      margin: 12px 0 0;
    }

    .products {
      max-width: 1450px;
      margin: 25px auto;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(255px, 1fr));
      gap: 25px;
      padding: 0 10px;
    }

    .card {
      background: linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02));
      border: 1px solid rgba(0,255,204,0.22);
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 0 25px rgba(0,0,0,0.35);
      transition: 0.25s;
    }

    .card:hover {
      transform: translateY(-6px);
      box-shadow: 0 0 35px rgba(0,255,204,0.22);
    }

    .card img {
      width: 100%;
      height: 230px;
      object-fit: cover;
      background: #081212;
      display: block;
    }

    .card-body {
      padding: 16px;
    }

    .card h3 {
      margin: 0 0 12px;
      font-size: 20px;
      min-height: 46px;
    }

    .card p {
      color: #aaa;
      margin: 7px 0;
    }

    .price {
      color: #00ffcc;
      font-size: 25px;
      font-weight: bold;
      margin: 14px 0;
    }

    .buy-btn,
    .remove-btn {
      width: 100%;
      padding: 13px;
      border-radius: 9px;
      cursor: pointer;
      font-size: 16px;
      border: none;
      margin-top: 10px;
      transition: 0.2s;
    }

    .buy-btn {
      background: rgba(255,255,255,0.06);
      color: #00ffcc;
      border: 1px solid rgba(0,255,204,0.35);
    }

    .buy-btn:hover {
      background: #00ffcc;
      color: black;
      font-weight: bold;
    }

    .remove-btn {
      background: crimson;
      color: white;
    }

    .remove-btn:hover {
      transform: scale(1.02);
    }

    .empty {
      max-width: 900px;
      margin: 40px auto;
      padding: 80px 20px;
      text-align: center;
      color: #888;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(0,255,204,0.15);
      border-radius: 22px;
    }

    .empty span {
      display: block;
      font-size: 70px;
      margin-bottom: 15px;
    }

    .empty a {
      display: inline-block;
      margin-top: 25px;
      padding: 15px 28px;
      border-radius: 10px;
      background: #00ffcc;
      color: black;
      text-decoration: none;
      font-weight: bold;
    }

    .toast {
      position: fixed;
      top: 20px;
      right: 20px;
      background: #111;
      color: white;
      padding: 14px 20px;
      border-radius: 8px;
      box-shadow: 0 0 15px rgba(0,255,204,0.3);
      opacity: 0;
      transform: translateY(-20px);
      transition: 0.3s;
      z-index: 9999;
      font-weight: bold;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    .toast.success {
      background: #00aa88;
    }

    .toast.error {
      background: crimson;
    }

    @media (max-width: 900px) {
      .navbar {
        padding: 15px 20px;
        flex-wrap: wrap;
        height: auto;
        gap: 15px;
      }

      .page-header {
        margin: 15px;
      }

      .page-header h1 {
        font-size: 34px;
      }

      .products {
        padding: 0 15px;
      }
    }
  </style>
</head>

<body>

<div class="navbar">

  <div class="logo">
    MY <span>SHOP</span>
  </div>

  <div class="nav-links">
    <a href="/index.html">Главная</a>
    <a href="/products.html">Товары</a>
    <a href="/cart.html">
      🛒 Корзина (<span id="cart-count">0</span>)
    </a>
  </div>

  <div id="user-block">
    <a href="/login.html">
      <button class="btn">Вход</button>
    </a>
  </div>

</div>

<section class="page-header">
  <h1>
    ❤️ <span>Избранное</span>
  </h1>

  <p>
    Здесь хранятся товары, которые вам понравились
  </p>
</section>

<div class="products" id="products"></div>

<div id="toast" class="toast"></div>

<script>

function showToast(message, type = "success") {
  const toast =
    document.getElementById("toast");

  toast.textContent = message;

  toast.className =
    "toast show " + type;

  setTimeout(() => {
    toast.className =
      "toast " + type;
  }, 2500);
}

function updateCartCount() {
  const cart =
    JSON.parse(localStorage.getItem("cart")) || [];

  const el =
    document.getElementById("cart-count");

  if (el) {
    el.textContent = cart.length;
  }
}

async function checkUser() {
  const user =
    JSON.parse(localStorage.getItem("user"));

  const block =
    document.getElementById("user-block");

  if (!user || !block) return;

  let unread = 0;

  try {
    const res =
      await fetch("/messages/unread/" + user.email);

    const data =
      await res.json();

    unread =
      data.unread || 0;
  } catch {}

  block.innerHTML = `
    <div class="user-menu">

      <button
        class="user-btn"
        onclick="toggleMenu()"
      >
         ${user.name} ▼
      </button>

      <div class="dropdown" id="dropdownMenu">

        <a href="/notifications.html">
          🔔 Уведомления
          ${unread > 0 ? `<span class="badge">${unread}</span>` : ""}
        </a>

        <a href="/messages.html">
          💬 Сообщения
        </a>

        <a href="/favorites.html">
          ❤️ Избранное
        </a>

        <a href="/add-product.html">
          ➕ Добавить товар
        </a>

        <a href="/my-products.html">
          📦 Мои товары
        </a>

        <a href="/profile.html">
          👤 Личный кабинет
        </a>

        ${user.email === "sobakizomb@gmail.com" ? `
          <a href="/admin.html">
            ⚙️ Админка
          </a>
        ` : ""}

        <button onclick="logout()">
          🚪 Выйти
        </button>

      </div>

    </div>
  `;
}

function toggleMenu() {
  document
    .getElementById("dropdownMenu")
    .classList.toggle("show");
}

function logout() {
  localStorage.removeItem("user");
  window.location.href = "/login.html";
}

window.addEventListener("click", function(e) {
  const menu =
    document.getElementById("dropdownMenu");

  const btn =
    document.querySelector(".user-btn");

  if (!menu || !btn) return;

  if (
    !menu.contains(e.target) &&
    !btn.contains(e.target)
  ) {
    menu.classList.remove("show");
  }
});

function loadFavorites() {
  const favorites =
    JSON.parse(localStorage.getItem("favorites")) || [];

  const container =
    document.getElementById("products");

  container.innerHTML = "";

  if (favorites.length === 0) {
    container.innerHTML = `
      <div class="empty">
        <span>♡</span>
        <h2>Избранное пустое</h2>
        <p>Добавьте товары, которые хотите сохранить</p>
        <a href="/products.html">
          Перейти к товарам
        </a>
      </div>
    `;
    return;
  }

  favorites.forEach((p, index) => {
    const img =
      p.images && p.images.length > 0
        ? p.images[0]
        : p.image;

    container.innerHTML += `
      <div class="card">

        <a href="/product.html?id=${p._id}">
          <img src="${img}">
        </a>

        <div class="card-body">

          <h3>${p.title}</h3>

          <p>
            📂 ${p.category || "Другое"}
          </p>

          <p>
            📍 ${p.city || "Не указан"}
          </p>

          <div class="price">
            ${p.price} ₸
          </div>

          <a href="/product.html?id=${p._id}">
            <button class="buy-btn">
              Подробнее →
            </button>
          </a>

          <button
            class="remove-btn"
            onclick="removeFavorite(${index})"
          >
            🗑 Удалить из избранного
          </button>

        </div>

      </div>
    `;
  });
}

function removeFavorite(index) {
  let favorites =
    JSON.parse(localStorage.getItem("favorites")) || [];

  favorites.splice(index, 1);

  localStorage.setItem(
    "favorites",
    JSON.stringify(favorites)
  );

  loadFavorites();

  showToast(
    "Удалено из избранного",
    "success"
  );
}

updateCartCount();
checkUser();
loadFavorites();

</script>

</body>
</html>
