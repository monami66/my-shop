<!DOCTYPE html>
<html>

<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Личный кабинет</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial;
      background: #020808;
      color: white;
    }

    .navbar {
      height: 75px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 55px;
      background: rgba(0,0,0,0.9);
      border-bottom: 1px solid rgba(0,255,204,0.15);
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    .logo {
      font-size: 30px;
      font-weight: bold;
      color: white;
    }

    .logo span {
      color: #00ffcc;
    }

    .nav-links {
      display: flex;
      gap: 35px;
      align-items: center;
      flex-wrap: wrap;
    }

    .nav-links a {
      color: white;
      text-decoration: none;
      font-size: 17px;
      padding-bottom: 8px;
    }

    .nav-links a:hover {
      color: #00ffcc;
      border-bottom: 2px solid #00ffcc;
    }

    .btn,
    .user-btn {
      background: #00ffcc;
      color: black;
      border: none;
      padding: 12px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }

    .user-menu {
      position: relative;
    }

    .dropdown {
      display: none;
      position: absolute;
      right: 0;
      top: 50px;
      background: #081212;
      min-width: 240px;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 0 25px rgba(0,255,204,0.25);
      border: 1px solid rgba(0,255,204,0.25);
      z-index: 1000;
    }

    .dropdown.show {
      display: block;
    }

    .dropdown a,
    .dropdown button {
      display: block;
      width: 100%;
      padding: 13px;
      border: none;
      background: #081212;
      text-align: left;
      cursor: pointer;
      text-decoration: none;
      color: white;
      font-size: 15px;
    }

    .dropdown a:hover,
    .dropdown button:hover {
      background: #102020;
      color: #00ffcc;
    }

    .badge {
      background: crimson;
      color: white;
      padding: 3px 8px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: bold;
      margin-left: 5px;
    }

    .page-header {
      max-width: 1100px;
      margin: 25px auto;
      padding: 35px 40px;
      border-radius: 22px;
      border: 1px solid rgba(0,255,204,0.22);
      background:
        radial-gradient(circle at 80% 50%, rgba(0,255,204,0.18), transparent 35%),
        linear-gradient(90deg, #020808 0%, #061414 60%, #031010 100%);
      box-shadow: 0 0 35px rgba(0,255,204,0.08);
    }

    .page-header h1 {
      margin: 0;
      font-size: 44px;
    }

    .page-header h1 span {
      color: #00ffcc;
    }

    .page-header p {
      color: #bcbcbc;
      font-size: 18px;
      margin: 12px 0 0;
    }

    .profile {
      max-width: 650px;
      margin: 25px auto;
      background: rgba(255,255,255,0.03);
      padding: 30px;
      border-radius: 22px;
      text-align: center;
      border: 1px solid rgba(0,255,204,0.15);
      box-shadow: 0 0 35px rgba(0,0,0,0.45);
    }

    .avatar {
      width: 130px;
      height: 130px;
      border-radius: 50%;
      background: #00ffcc;
      color: black;
      font-size: 48px;
      font-weight: bold;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0 auto 20px;
      box-shadow: 0 0 30px rgba(0,255,204,0.35);
    }

    .profile h2 {
      font-size: 32px;
      margin-bottom: 20px;
      color: #00ffcc;
    }

    .info {
      text-align: left;
      margin-top: 20px;
      background: rgba(255,255,255,0.035);
      border: 1px solid rgba(0,255,204,0.15);
      border-radius: 15px;
      padding: 18px;
    }

    .info p {
      font-size: 18px;
      margin: 12px 0;
      color: #ccc;
    }

    .change-name-input {
      width: 100%;
      padding: 14px;
      margin-top: 20px;
      box-sizing: border-box;
      border-radius: 10px;
      border: 1px solid rgba(0,255,204,0.18);
      background: #071111;
      color: white;
      outline: none;
    }

    .change-name-input:focus {
      border-color: #00ffcc;
      box-shadow: 0 0 15px rgba(0,255,204,0.18);
    }

    .save-btn,
    .logout-btn {
      width: 100%;
      padding: 14px;
      margin-top: 12px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-size: 16px;
      font-weight: bold;
    }

    .save-btn {
      background: #00ffcc;
      color: black;
    }

    .logout-btn {
      background: crimson;
      color: white;
    }

    .orders {
      max-width: 1100px;
      margin: 25px auto 50px;
      background: rgba(255,255,255,0.03);
      padding: 25px;
      border-radius: 22px;
      border: 1px solid rgba(0,255,204,0.15);
      box-shadow: 0 0 35px rgba(0,0,0,0.45);
    }

    .orders h2 {
      text-align: center;
      color: #00ffcc;
      margin-top: 0;
    }

    .order {
      border: 1px solid rgba(0,255,204,0.16);
      border-radius: 16px;
      padding: 18px;
      margin-top: 15px;
      background: rgba(255,255,255,0.035);
    }

    .order-header {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
      font-weight: bold;
      margin-bottom: 10px;
      color: white;
    }

    .status {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 20px;
      background: #00ffcc;
      color: black;
      font-size: 14px;
    }

    .order p {
      color: #ccc;
    }

    .items {
      margin-top: 10px;
    }

    .item {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 10px;
      background: #071111;
      padding: 10px;
      border-radius: 12px;
      border: 1px solid rgba(0,255,204,0.12);
    }

    .item img {
      width: 65px;
      height: 65px;
      object-fit: cover;
      border-radius: 8px;
      background: #081212;
    }

    .item-info {
      flex: 1;
      color: #ddd;
    }

    .total {
      text-align: right;
      font-size: 20px;
      font-weight: bold;
      color: #00ffcc;
      margin-top: 15px;
    }

    .toast {
      position: fixed;
      top: 20px;
      right: 20px;
      background: #111;
      color: white;
      padding: 14px 20px;
      border-radius: 8px;
      box-shadow: 0 0 15px rgba(0,255,204,0.3);
      opacity: 0;
      transform: translateY(-20px);
      transition: 0.3s;
      z-index: 9999;
      font-weight: bold;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    .toast.success {
      background: #00aa88;
    }

    .toast.error {
      background: crimson;
    }

<div class="navbar">

  <div class="logo">
    MY <span>SHOP</span>
  </div>

  <div class="nav-links">
    <a href="/index.html">Главная</a>
    <a href="/products.html">Товары</a>
    <a href="/cart.html">
       Корзина (<span id="cart-count">0</span>)
    </a>
  </div>

  <div id="user-block">
    <a href="/login.html">
      <button class="btn">Вход</button>
    </a>
  </div>

</div>

<section class="page-header">
  <h1>
     <span>Личный кабинет</span>
  </h1>
  <p>
    Управление аккаунтом и история заказов
  </p>
</section>

<div class="profile">

  <div class="avatar" id="avatar">U</div>

  <h2 id="userName">Пользователь</h2>

  <div class="info">
    <p><b>Email:</b> <span id="userEmail"></span></p>
    <p><b>ID:</b> <span id="userId"></span></p>
  </div>

  <input
    id="newName"
    class="change-name-input"
    placeholder="Новое имя"
  >

  <button class="save-btn" onclick="changeName()">
    Сохранить имя
  </button>

     Выйти
  </button>

</div>

<div class="orders">

  <h2>Мои заказы</h2>

  <div id="ordersList"></div>
<h2 style="margin-top:40px;">
   Заказы моих товаров
</h2>

<div id="sellerOrders"></div>
</div>

<div id="toast" class="toast"></div>

<script>

function showToast(message, type = "success") {
  const toast =
    document.getElementById("toast");

  toast.textContent = message;

  toast.className =
    "toast show " + type;

  setTimeout(() => {
    toast.className =
      "toast " + type;
  }, 2500);
}

function updateCartCount() {
  const cart =
    JSON.parse(localStorage.getItem("cart")) || [];

  const el =
    document.getElementById("cart-count");

  if (el) {
    el.textContent = cart.length;
  }
}

async function checkUser() {
  const user =
    JSON.parse(localStorage.getItem("user"));

  const block =
    document.getElementById("user-block");

  if (!user || !block) return;

  let unread = 0;

  try {
    const res =
      await fetch("/messages/unread/" + user.email);

    const data =
      await res.json();

    unread =
      data.unread || 0;
  } catch {}

  block.innerHTML = `
    <div class="user-menu">

      <button
        class="user-btn"
        onclick="toggleMenu()"
      >
         ${user.name} ▼
      </button>

      <div class="dropdown" id="dropdownMenu">

        <a href="/notifications.html">
           Уведомления
          ${unread > 0 ? `<span class="badge">${unread}</span>` : ""}
        </a>

        <a href="/messages.html">
           Сообщения
        </a>

        <a href="/favorites.html">
           Избранное
        </a>

        <a href="/add-product.html">
           Добавить товар
        </a>

        <a href="/my-products.html">
           Мои товары
        </a>

        <a href="/profile.html">
           Личный кабинет
        </a>

        ${[
  "sobakizomb@gmail.com",
  "nigmetovdaniar78@gmail.com"
].includes(user.email) ? `
          <a href="/admin.html">
             Админка
          </a>
        ` : ""}

        <button onclick="logout()">
           Выйти
        </button>

      </div>

    </div>
  `;
}

function toggleMenu() {
  const menu =
    document.getElementById("dropdownMenu");

  menu.classList.toggle("show");
}

function logout() {
  localStorage.removeItem("user");
  window.location.href = "/login.html";
}

window.addEventListener("click", function(e) {
  const menu =
    document.getElementById("dropdownMenu");

  const btn =
    document.querySelector(".user-btn");

  if (!menu || !btn) return;

  if (
    !menu.contains(e.target) &&
    !btn.contains(e.target)
  ) {
    menu.classList.remove("show");
  }
});

function loadProfile() {
  const user =
    JSON.parse(localStorage.getItem("user"));

  if (!user) {
    showToast("Сначала войдите", "error");

    setTimeout(() => {
      window.location.href = "/login.html";
    }, 1200);

    return;
  }

  document.getElementById("userName")
    .textContent = user.name;

  document.getElementById("userEmail")
    .textContent = user.email;

  document.getElementById("userId")
    .textContent = user.id;

  document.getElementById("avatar")
    .textContent =
      user.name.charAt(0).toUpperCase();
}

async function changeName() {
  const user =
    JSON.parse(localStorage.getItem("user"));

  const newName =
    document.getElementById("newName").value;

  if (!newName) {
    showToast("Введите новое имя", "error");
    return;
  }

  const res =
    await fetch("/users/" + user.id + "/name", {
      method: "PUT",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        name: newName
      })
    });

  const data =
    await res.json();

  if (!res.ok) {
    showToast(
      data.message || "Ошибка изменения имени",
      "error"
    );
    return;
  }

  localStorage.setItem(
    "user",
    JSON.stringify(data.user)
  );

  showToast("Имя изменено", "success");

  setTimeout(() => {
    location.reload();
  }, 1000);
}

async function loadOrders() {
  const user =
    JSON.parse(localStorage.getItem("user"));

  const container =
    document.getElementById("ordersList");

  if (!user) return;

  const res =
    await fetch("/my-orders/" + user.email);

  const orders =
    await res.json();

  container.innerHTML = "";

  if (orders.length === 0) {
    container.innerHTML =
      "<h3 style='text-align:center;color:#888;'>У вас пока нет заказов</h3>";
    return;
  }

  orders.reverse().forEach(order => {
    let itemsHtml = "";

    (order.items || []).forEach(item => {
      const img =
        item.images?.[0] ||
        item.image ||
        "https://placehold.co/100x100?text=No+Image";

      itemsHtml += `
        <div class="item">
          <img src="${img}">

          <div class="item-info">
            <b>${item.title}</b>
            <p>
              ${item.price} ₸ x ${item.quantity || 1}
            </p>
          </div>
        </div>
      `;
    });

    container.innerHTML += `
      <div class="order">

        <div class="order-header">
          <span>Заказ № ${order._id}</span>
          <span class="status">${order.status || "Новый"}</span>
        </div>

        <p><b>Имя:</b> ${order.name || ""}</p>
        <p><b>Телефон:</b> ${order.phone || ""}</p>
        <p><b>Адрес:</b> ${order.address || ""}</p>

        <div class="items">
          ${itemsHtml}
        </div>

        <div class="total">
  Итого: ${order.total || 0} ₸
</div>

<div class="buyer-buttons">

  ${order.status !== "Отменён"
    && order.status !== "Завершён"
    ? `
      <button
        class="buyer-cancel-btn"
        onclick="cancelBuyerOrder('${order._id}')"
      >
        ❌ Отменить заказ
      </button>
    `
    : ""
  }

  <button
    class="buyer-chat-btn"
    onclick="
      openSellerChat(
        '${order.items?.[0]?._id}',
        '${order.items?.[0]?.user?.email}',
        '${order.items?.[0]?.user?.name}'
      )
    "
  >
    💬 Связаться с продавцом
  </button>

</div>
      </div>
    `;
  });
}

  async function loadSellerOrders() {

  const user =
    JSON.parse(localStorage.getItem("user"));

  if (!user) return;

  const res =
    await fetch("/orders");

  const orders =
    await res.json();

  const container =
    document.getElementById("sellerOrders");

  if (!container) return;

  container.innerHTML = "";

  orders.reverse().forEach(order => {

    (order.items || []).forEach(item => {

      if (
  item.user?.email === user.email
) {

        const image =
          item.images &&
          item.images.length > 0
            ? item.images[0]
            : item.image;

        container.innerHTML += `

          <div class="seller-order">

            <h3>
               ${item.title}
            </h3>

            <img src="${image}">

            <p>
              👤 Покупатель:
              ${order.name}
            </p>

            <p>
              📞 Телефон:
              ${order.phone}
            </p>

            <p>
              📍 Адрес:
              ${order.address}
            </p>

            <p>
              💰 Сумма:
              ${item.price} ₸
            </p>

            <p>
              📄 Статус:
              ${order.status}
            </p>

${order.status === "Завершён" || order.status === "Отменён" ? `

  <div class="status-final ${order.status === "Завершён" ? "done" : "cancel"}">

    ${order.status === "Завершён"
      ? " Продажа завершена"
      : " Продажа отменена"
    }

  </div>

  <button
    class="delete-order-btn"
    onclick="deleteOrder('${order._id}')"
  >
     Удалить заказ
  </button>

` : `

  <div class="seller-buttons">

    <button
      class="finish-btn"
      onclick="finishOrder('${order._id}')"
    >
       Завершить продажу
    </button>

    <button
      class="cancel-btn"
      onclick="cancelOrder('${order._id}')"
    >
       Отменить продажу
    </button>

    <button
      class="chat-btn"
      onclick="
        openBuyerChat(
          '${item._id}',
          '${order.user?.email}',
          '${order.name}'
        )
      "
    >
       Связаться с покупателем
    </button>

  </div>

`}

          </div>
        `;
      }
    });

  });

  if (container.innerHTML === "") {

    container.innerHTML = `
      <p style="color:#888;">
        Пока заказов нет
      </p>
    `;
  }
}

async function finishOrder(id) {

  await fetch("/orders/" + id + "/status", {

    method: "PUT",

    headers: {
      "Content-Type": "application/json"
    },

    body: JSON.stringify({
      status: "Завершён"
    })
  });


  loadSellerOrders();
}

async function cancelOrder(id) {

  await fetch("/orders/" + id + "/status", {

    method: "PUT",

    headers: {
      "Content-Type": "application/json"
    },

    body: JSON.stringify({
      status: "Отменён"
    })
  });

  loadSellerOrders();
}

function openBuyerChat(
  productId,
  buyerEmail,
  buyerName
) {

  const user =
    JSON.parse(localStorage.getItem("user"));

  if (!user) return;

  window.location.href =

    `/chat.html?productId=${productId}` +

    `&sellerEmail=${buyerEmail}` +

    `&sellerName=${buyerName}`;
} 
async function deleteOrder(id) {

  const agree =
    confirm("Удалить заказ?");

  if (!agree) return;

  await fetch("/orders/" + id, {

    method: "DELETE"

  });

  loadSellerOrders();
}
async function cancelBuyerOrder(id) {

  const agree =
    confirm("Отменить заказ?");

  if (!agree) return;

  await fetch("/orders/" + id + "/status", {

    method: "PUT",

    headers: {
      "Content-Type": "application/json"
    },

    body: JSON.stringify({
      status: "Отменён"
    })
  });

  loadOrders();
}

function openSellerChat(
  productId,
  sellerEmail,
  sellerName
) {

  window.location.href =

    `/chat.html?productId=${productId}` +

    `&sellerEmail=${sellerEmail}` +

    `&sellerName=${sellerName}`;
}

updateCartCount();
checkUser();
loadProfile();
loadOrders();
loadSellerOrders();

</script>
