<!DOCTYPE html>
<html>

<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Регистрация</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial;
      background:
        radial-gradient(circle at top right, rgba(0,255,204,0.15), transparent 30%),
        linear-gradient(135deg, #020808 0%, #031010 40%, #071818 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .bg-glow {
      position: absolute;
      width: 500px;
      height: 500px;
      background: rgba(0,255,204,0.08);
      filter: blur(120px);
      border-radius: 50%;
    }

    .bg1 {
      top: -150px;
      right: -100px;
    }

    .bg2 {
      bottom: -180px;
      left: -120px;
    }

    .register-box {
      width: 450px;
      position: relative;
      z-index: 2;
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(14px);
      border: 1px solid rgba(0,255,204,0.15);
      border-radius: 28px;
      padding: 40px;
      box-shadow: 0 0 40px rgba(0,0,0,0.45);
    }

    .logo {
      text-align: center;
      font-size: 34px;
      font-weight: bold;
      color: white;
      margin-bottom: 10px;
    }

    .logo span {
      color: #00ffcc;
    }

    .subtitle {
      text-align: center;
      color: #aaa;
      margin-bottom: 35px;
      font-size: 16px;
    }

    .input-group {
      position: relative;
      margin-bottom: 18px;
    }

    .input-group input {
      width: 100%;
      padding: 16px 16px 16px 50px;
      border-radius: 14px;
      border: 1px solid rgba(0,255,204,0.14);
      background: rgba(255,255,255,0.03);
      color: white;
      font-size: 15px;
      outline: none;
    }

    .input-group input:focus {
      border-color: #00ffcc;
      box-shadow: 0 0 20px rgba(0,255,204,0.12);
    }

    .icon {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: #00ffcc;
      font-size: 18px;
    }

    .register-btn {
      width: 100%;
      padding: 15px;
      margin-top: 10px;
      border: none;
      border-radius: 14px;
      background: #00ffcc;
      color: black;
      font-size: 17px;
      font-weight: bold;
      cursor: pointer;
    }

    .register-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 25px rgba(0,255,204,0.35);
    }

    .login-link {
      text-align: center;
      margin-top: 25px;
      color: #aaa;
      font-size: 15px;
    }

    .login-link a {
      color: #00ffcc;
      text-decoration: none;
      font-weight: bold;
    }

    .toast {
      position: fixed;
      top: 20px;
      right: 20px;
      background: #111;
      color: white;
      padding: 14px 20px;
      border-radius: 10px;
      opacity: 0;
      transform: translateY(-20px);
      transition: 0.3s;
      z-index: 9999;
      font-weight: bold;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    .toast.success {
      background: #00aa88;
    }

    .toast.error {
      background: crimson;
    }
    @media (max-width: 500px) {

  body {
    overflow-x: hidden;
    padding: 15px;
  }

  .register-box {

    width: 100%;

    padding: 30px 22px;

    border-radius: 22px;
  }

  .logo {

    font-size: 28px;
  }

  .subtitle {

    font-size: 15px;

    margin-bottom: 25px;
  }

  .input-group input {

    font-size: 16px;

    padding: 15px 15px 15px 45px;
  }

  .register-btn {

    font-size: 16px;

    padding: 14px;
  }

  .login-link {

    font-size: 14px;
  }

  .toast {

    left: 15px;

    right: 15px;

    text-align: center;
  }
}
  </style>
</head>

<body>

<div class="bg-glow bg1"></div>
<div class="bg-glow bg2"></div>

<div class="register-box">

  <div class="logo">
    MY <span>SHOP</span>
  </div>

  <div class="subtitle">
    Создайте новый аккаунт
  </div>

  <form onsubmit="register(event)">

    <div class="input-group">
      <span class="icon"></span>
      <input type="text" id="name" placeholder="Введите имя" required>
    </div>

    <div class="input-group">
      <span class="icon"></span>
      <input type="email" id="email" placeholder="Введите email" required>
    </div>

    <div class="input-group">
      <span class="icon"></span>
      <input type="password" id="password" placeholder="Введите пароль" required>
    </div>

    <button type="submit" class="register-btn">
      Зарегистрироваться
    </button>

  </form>

  <div class="login-link">
    Уже есть аккаунт?
    <a href="/login.html">Войти</a>
  </div>

</div>

<div id="toast" class="toast"></div>

<script>

function showToast(message, type = "success") {
  const toast = document.getElementById("toast");

  toast.textContent = message;
  toast.className = "toast show " + type;

  setTimeout(() => {
    toast.className = "toast " + type;
  }, 2500);
}

async function register(event) {
  event.preventDefault();

  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  try {
    const res = await fetch("/register", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        name,
        email,
        password
      })
    });

    const data = await res.json();

    if (!res.ok) {
      showToast(
        data.message || "Ошибка регистрации",
        "error"
      );
      return;
    }

    showToast("Регистрация успешна", "success");

    setTimeout(() => {
      window.location.href = "/login.html";
    }, 1200);

  } catch {
    showToast("Ошибка сервера", "error");
  }
}

</script>

</body>
</html>
